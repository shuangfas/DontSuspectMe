 global_aryan_liberation_war_title: "全球雅利安解放战争"
 global_aryan_liberation_war_quote: "\"我们的敌人卑劣至极，之所以看似“合法”，仅仅是因为金钱带来的权力。我们在此郑重宣告：我们将彻底击溃他们，而且，他们根本无力阻止！前路或许漫长而坎坷，但那一刻终将到来，届时我们的意志和猛烈打击都将势不可挡。今天不承认、不合作，就意味着明天绝不妥协、绝不留情。今天不施恩惠，就意味着明天无需履行任何义务。\"\n————詹姆斯·梅森"
 global_aryan_liberation_war_close: "§R最终之战！§!"