 dsm.1.t: "舞台"
 dsm.1.desc: "全世界的目光都聚集在那几个人身上。\n\n他们被称为“极端主义残党”。他们的名字、照片、曾经发布过的言论，被反复展示在各国新闻频道中。人们等待着观看这场公开审判，等待着一个答案。\n\n[ATW.GetName]是否真的正在改变？\n\n官方给出了肯定的回答。\n\n“我们承认过去存在错误。”\n\n“我们不会再允许仇恨和疯狂主导我们的未来。”\n\n“今天，我们清除那些最极端的声音。”\n\n而那些站在台上的人，不过是最容易被牺牲的棋子。他们不是决策者，不是计划制定者，甚至不是这个体系真正的核心。他们只是太过公开地说出了不该被世界听见的话。\n\n但这已经足够了。\n\n世界需要一个解释，而[ATW.GetName]需要一个替罪羊。\n\n当丧钟敲响，最后一个名字从名单上被划去。"
 dsm.1.a: "杀掉几个疯子，总比暴露好。"
 dsm.2.t: "沉默"
 dsm.2.desc: "“我跟随您九年。”\n\n“我见证了我们从佛罗里达到整个美国”\n\n“但现在，您签下了一条新的边界。”\n\n“外面的人说我们的计划失败了。”\n\n“他们说我们向旧体制低头了。”\n\n元首没有抬头。\n\n“那你呢？”\n\n“你也相信他们的话？”\n\n“我相信结果。”\n\n“他们看见的是退让，他们看不见真正的计划。”\n\n元首指向地图。\n\n“死人不会改变计划。”\n\n“让他们相信我们已经失败。”\n\n“让他们相信旧体制仍在铁路上运行。”\n\n“但[ATW.GetName]不会就这样停下脚步，而...”"
 dsm.2.a: "“新秩序的到来，从来不需要他们同意。”"
 dsm.3.t: "伪装"
 dsm.3.desc: "三辆贴有联合国标志的越野车驶入“和平原子能研究中心”的大门。元首站在落地窗前，看着那群穿着西装、戴着眼镜的学者们鱼贯而下。他们手里拿着笔记本、辐射探测仪——以及摄录设备。\n\n元首的“导游”递上去的参观路线图上，标注了A区-洁净实验室、B区-员工食堂和C区-和平鸽雕像。所有的“敏感区域”都被巧妙地标记为“设备维护中”。\n\n为首的一名物理学家仰头看向元首的窗口，推了推眼镜。看不清楚他的眼神。\n\n随即，加密通讯器震动。情报部长：\n\n“元首，他们来之前，有一封加密邮件发往维也纳。我们还不知道内容。需要‘意外中断’这次参观吗？”\n\n元首拿起对讲机，看了一眼窗外——那群学者正在A区门口合影，笑容灿烂。"
 dsm.3.a: "“一切照旧”"
 dsm.4.t: "陆军部的报告"
 dsm.4.desc: "机密等级：Ⅳ\n发布单位：	[ATW.GetFlag][ATW.GetName]陆军\n日期：[GetDate]\n\n一、国际局势评估：\n\n当前国际社会对我国军事活动与战略方向持续保持高度关注。近期外交压力、情报监视以及经济限制措施均表明，外部势力正在尝试判断我国真实意图。\n\n陆军部认为，当前阶段应避免不必要的军事刺激，同时维持必要的战略威慑能力。任何形式的公开退让，都可能被敌对势力解读为软弱；任何过度扩张，也可能导致国际联合制衡。\n\n二、军备调整方案：\n\n根据最高指挥部指示，陆军部已制定阶段性裁军计划。部分非核心军事单位可进行重组，以向国际社会展示有限合作意愿。\n\n但必须强调，裁军措施不应影响核心作战能力，不得削弱长期战略目标所需的军事基础。\n\n陆军部战略规划局\n\n档案编号：ATWarmy-040\n\n 请示[ATW.GetLeader]：，，，"
 dsm.4.a: "裁军30%"
 dsm.4.b: "静观其变"
 dsm.4.c: "我们不接受§a任何条件§!"
 dsm.4.c.desc: "这将会直接引爆§R雅利安解放战争§!!"

