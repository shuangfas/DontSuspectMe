l_simp_chinese:
 ATW_execute_most_extreme_extremists_decision: "处决过于极端的极端分子"
 ATW_execute_most_extreme_extremists_decision_desc: "公开处决某些在社交媒体上公开发布极端言论的非核心人员，向世界宣告，我们不再是恐怖分子"
 ATW_leak_false_information: "公布假消息"
 ATW_leak_false_information_desc: "故意让我们的情报部门向联合国公开表明，我们的目标仅仅是实现北美洲统一，联合并建立纯正雅利安人国度\n §Y一旦我们的真实意图暴露，或者遭到怀疑，我们将会被联合国列为§!  §R第一大威胁§! ，§Y并遭到§!  §R全球围攻§!"
 dsm.1.t: "舞台"
 dsm.1.desc: "全世界的目光都聚集在那几个人身上。\n\n他们被称为“极端主义残党”。他们的名字、照片、曾经发布过的言论，被反复展示在各国新闻频道中。人们等待着观看这场公开审判，等待着一个答案。\n\n[ATW.GetName]是否真的正在改变？\n\n官方给出了肯定的回答。\n\n“我们承认过去存在错误。”\n\n“我们不会再允许仇恨和疯狂主导我们的未来。”\n\n“今天，我们清除那些最极端的声音。”\n\n而那些站在台上的人，不过是最容易被牺牲的棋子。他们不是决策者，不是计划制定者，甚至不是这个体系真正的核心。他们只是太过公开地说出了不该被世界听见的话。\n\n但这已经足够了。\n\n世界需要一个解释，而[ATW.GetName]需要一个替罪羊。\n\n当丧钟敲响，最后一个名字从名单上被划去。"
 dsm.1.a: "杀掉几个疯子，总比暴露好。"