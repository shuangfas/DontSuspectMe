 ATW_leak_false_information_desc: "故意让我们的情报部门向联合国公开表明，我们的目标仅仅是实现北美洲统一，联合并建立纯正雅利安人国度\n §Y一旦我们的真实意图暴露，或者遭到怀疑，我们将会被联合国列为§!  §R第一大威胁§! ，§Y并遭到§!  §R全球围攻§!\n\n"
 ATW_disguised_nuclear_reactor_decision: "核反应堆民用化伪装"
 ATW_disguised_nuclear_reactor_decision_desc: "情报部门报告：我们的核设施已引起国际原子能机构的“特别关注”。卫星照片、地震波监测、空中采样——他们正在拼凑真相。\n我们必须抢在前面。将重水反应堆申报为“同位素生产中心”，将浓缩离心机伪装成“医用放射性药物提炼线”。我们将邀请一批经过筛选的“国际学者”——他们吃我们的饭、拿我们的钱、在我们的导游带领下走我们指定的路线——来亲眼“见证”我们的和平诚意"
 dsm.1.t: "舞台"
 dsm.1.desc: "全世界的目光都聚集在那几个人身上。\n\n他们被称为“极端主义残党”。他们的名字、照片、曾经发布过的言论，被反复展示在各国新闻频道中。人们等待着观看这场公开审判，等待着一个答案。\n\n[ATW.GetName]是否真的正在改变？\n\n官方给出了肯定的回答。\n\n“我们承认过去存在错误。”\n\n“我们不会再允许仇恨和疯狂主导我们的未来。”\n\n“今天，我们清除那些最极端的声音。”\n\n而那些站在台上的人，不过是最容易被牺牲的棋子。他们不是决策者，不是计划制定者，甚至不是这个体系真正的核心。他们只是太过公开地说出了不该被世界听见的话。\n\n但这已经足够了。\n\n世界需要一个解释，而[ATW.GetName]需要一个替罪羊。\n\n当丧钟敲响，最后一个名字从名单上被划去。"
 dsm.1.a: "杀掉几个疯子，总比暴露好。"
 dsm.2.t: "沉默"
 dsm.2.desc: "“我跟随您九年。”\n\n“我见证了我们从佛罗里达到整个美国”\n\n“但现在，您签下了一条新的边界。”\n\n“外面的人说我们的计划失败了。”\n\n“他们说我们向旧体制低头了。”\n\n元首没有抬头。\n\n“那你呢？”\n\n“你也相信他们的话？”\n\n“我相信结果。”\n\n“他们看见的是退让，他们看不见真正的计划。”\n\n元首指向地图。\n\n“死人不会改变计划。”\n\n“让他们相信我们已经失败。”\n\n“让他们相信旧体制仍然安全。”\n\n“[ATM.GetName]不会就这样停下脚步，而...”"
 dsm.2.a: "“新秩序的到来，从来不需要他们同意。”"
 dsm.3.t: "伪装"
 dsm.3.desc: "三辆贴有联合国标志的越野车驶入“和平原子能研究中心”的大门。元首站在落地窗前，看着那群穿着西装、戴着眼镜的学者们鱼贯而下。他们手里拿着笔记本、辐射探测仪——以及摄录设备。\n\n元首的“导游”递上去的参观路线图上，标注了A区（洁净实验室）、B区（员工食堂）和C区（草坪与和平鸽雕像）。所有的“敏感区域”都被巧妙地标记为“设备维护中”。\n\n为首的一名物理学家仰头看向元首的窗口，推了推眼镜。看不清楚他的眼神。\n\n随即，加密通讯器震动。情报部长：\n\n“元首，他们来之前，有一封加密邮件发往维也纳。我们还不知道内容。需要‘意外中断’这次参观吗？”\n\n元首拿起对讲机，看了一眼窗外——那群学者正在A区门口合影，笑容灿烂。"
 dsm.3.a: "“一切照旧”"